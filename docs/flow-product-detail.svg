  <rect x="820" y="105" width="220" height="95" class="box"/><text x="930" y="138" text-anchor="middle" class="t">React Router</text><text x="930" y="166" text-anchor="middle" class="s">navigate(slug)</text>
  <rect x="260" y="285" width="240" height="85" class="box"/><text x="380" y="318" text-anchor="middle" class="t">ProductSlugRoute</text><text x="380" y="344" text-anchor="middle" class="s">parse id từ slug</text>
  <rect x="600" y="285" width="240" height="85" class="box"/><text x="720" y="318" text-anchor="middle" class="t">ProductPage</text><text x="720" y="344" text-anchor="middle" class="s">render sản phẩm + reviews</text>
