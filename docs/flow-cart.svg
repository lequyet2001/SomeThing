<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460" viewBox="0 0 1100 460">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/></marker></defs>
  <style>.box{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:12}.api{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.t{font-family:Arial,sans-serif;font-size:19px;fill:#111827}.s{font-family:Arial,sans-serif;font-size:14px;fill:#334155}.h{font-family:Arial,sans-serif;font-size:24px;font-weight:700;fill:#0f172a}.ar{stroke:#16a34a;stroke-width:3;marker-end:url(#a);fill:none}</style>
  <text x="550" y="40" text-anchor="middle" class="h">Luồng giỏ hàng: thêm, sửa số lượng, xóa sản phẩm</text>
  <rect x="40" y="90" width="190" height="100" class="box"/><text x="135" y="128" text-anchor="middle" class="t">UI thao tác</text><text x="135" y="156" text-anchor="middle" class="s">add / update / remove</text>
  <rect x="300" y="90" width="210" height="100" class="box"/><text x="405" y="128" text-anchor="middle" class="t">useCartActions</text><text x="405" y="156" text-anchor="middle" class="s">xử lý nghiệp vụ cart</text>
  <rect x="580" y="75" width="210" height="130" class="box"/><text x="685" y="112" text-anchor="middle" class="t">cartSlice</text><text x="685" y="140" text-anchor="middle" class="s">cập nhật optimistic</text><text x="685" y="164" text-anchor="middle" class="s">items: productId + quantity</text>
  <rect x="850" y="75" width="200" height="130" class="api"/><text x="950" y="112" text-anchor="middle" class="t">Cart API</text><text x="950" y="140" text-anchor="middle" class="s">nếu user đăng nhập</text><text x="950" y="164" text-anchor="middle" class="s">POST/PATCH/DELETE</text>
  <rect x="310" y="300" width="230" height="95" class="box"/><text x="425" y="335" text-anchor="middle" class="t">useShopDerivedState</text><text x="425" y="362" text-anchor="middle" class="s">tạo cartLines + tổng tiền</text>
  <rect x="620" y="300" width="220" height="95" class="box"/><text x="730" y="335" text-anchor="middle" class="t">CartPage / Header</text><text x="730" y="362" text-anchor="middle" class="s">render count, item, total</text>
  <path d="M230 140 H300" class="ar"/><path d="M510 140 H580" class="ar"/><path d="M790 140 H850" class="ar"/><path d="M950 205 C930 275 825 300 790 310" class="ar"/><path d="M580 175 C500 240 445 270 425 300" class="ar"/><path d="M540 347 H620" class="ar"/>
</svg>
