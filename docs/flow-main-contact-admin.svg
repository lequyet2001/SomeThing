<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="1760" viewBox="0 0 1320 1760" role="img" aria-labelledby="title desc">
  <title id="title">Luồng liên hệ và quản trị cửa hàng</title>
  <desc id="desc">Biểu đồ cột dọc cho luồng gửi liên hệ và các thao tác quản trị sản phẩm, đơn hàng, người dùng, đánh giá, liên hệ.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 800 30px Arial, sans-serif; text-anchor: middle; }
      .subtitle { fill: #64748b; font: 15px Arial, sans-serif; text-anchor: middle; }
      .col { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .col-title { fill: #334155; font: 800 18px Arial, sans-serif; text-anchor: middle; }
      .ui { fill: #eef7ff; stroke: #5b9fd3; stroke-width: 2.2; }
      .admin { fill: #fff7e8; stroke: #df9c39; stroke-width: 2.2; }
      .server { fill: #f0fdf4; stroke: #49a66c; stroke-width: 2.2; }
      .notify { fill: #f4f0ff; stroke: #8b5cf6; stroke-width: 2.2; }
      .decision { fill: #ffffff; stroke: #df9c39; stroke-width: 2.2; }
      .divider { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 8; }
      .text { fill: #111827; font: 700 16px Arial, sans-serif; text-anchor: middle; }
      .meta { fill: #475569; font: 13px Arial, sans-serif; text-anchor: middle; }
      .section { fill: #334155; font: 800 18px Arial, sans-serif; text-anchor: middle; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8b5cf6; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .label { fill: #334155; font: 700 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1320" height="1760"/>
  <text class="title" x="660" y="54">Luồng chính: Liên hệ và quản trị cửa hàng</text>
  <text class="subtitle" x="660" y="82">Sơ đồ theo cột dọc, ưu tiên luồng từ trên xuống để không chồng nội dung</text>

  <rect class="col" x="45" y="115" width="280" height="1565" rx="22"/>
  <rect class="col" x="365" y="115" width="280" height="1565" rx="22"/>
  <rect class="col" x="685" y="115" width="280" height="1565" rx="22"/>
  <rect class="col" x="1005" y="115" width="280" height="1565" rx="22"/>
  <text class="col-title" x="185" y="153">Khách hàng</text>
  <text class="col-title" x="505" y="153">Admin UI</text>
  <text class="col-title" x="825" y="153">Backend / DB</text>
  <text class="col-title" x="1145" y="153">Thông báo</text>

  <text class="section" x="660" y="205">A. Gửi liên hệ/yêu cầu hỗ trợ</text>

  <rect class="ui" x="70" y="245" width="230" height="78" rx="15"/>
  <text class="text" x="185" y="274">Mở Contact</text>
  <text class="meta" x="185" y="298">/contact</text>

  <rect class="ui" x="70" y="390" width="230" height="78" rx="15"/>
  <text class="text" x="185" y="419">Nhập nội dung</text>
  <text class="meta" x="185" y="443">tên, email, message</text>

  <rect class="server" x="710" y="390" width="230" height="78" rx="15"/>
  <text class="text" x="825" y="419">Contact API</text>
  <text class="meta" x="825" y="443">POST /contact</text>

  <rect class="server" x="710" y="540" width="230" height="88" rx="15"/>
  <text class="text" x="825" y="571">Lưu MongoDB</text>
  <text class="meta" x="825" y="594">status pending</text>
  <text class="meta" x="825" y="612">gắn user nếu có</text>

  <rect class="ui" x="70" y="540" width="230" height="78" rx="15"/>
  <text class="text" x="185" y="569">Thông báo thành công</text>
  <text class="meta" x="185" y="593">popup/toast</text>

  <line class="divider" x1="70" y1="700" x2="1250" y2="700"/>
  <text class="section" x="660" y="745">B. Truy cập và tải dữ liệu quản trị</text>

  <rect class="admin" x="390" y="785" width="230" height="78" rx="15"/>
  <text class="text" x="505" y="814">Mở /admin/*</text>
  <text class="meta" x="505" y="838">route theo module</text>

  <polygon class="decision" points="825,770 940,840 825,910 710,840"/>
  <text class="text" x="825" y="830">Role admin?</text>
  <text class="meta" x="825" y="856">requireAdmin</text>

  <rect class="admin" x="390" y="945" width="230" height="88" rx="15"/>
  <text class="text" x="505" y="976">Load dashboard</text>
  <text class="meta" x="505" y="999">summary, orders</text>
  <text class="meta" x="505" y="1017">products, users...</text>

  <rect class="server" x="710" y="945" width="230" height="88" rx="15"/>
  <text class="text" x="825" y="976">Admin APIs</text>
  <text class="meta" x="825" y="999">GET /admin/*</text>
  <text class="meta" x="825" y="1017">filter/search</text>

  <line class="divider" x1="70" y1="1105" x2="1250" y2="1105"/>
  <text class="section" x="660" y="1150">C. Thao tác quản lý</text>

  <rect class="admin" x="390" y="1190" width="230" height="98" rx="15"/>
  <text class="text" x="505" y="1222">Chọn module</text>
  <text class="meta" x="505" y="1245">overview, products</text>
  <text class="meta" x="505" y="1263">orders, users, reviews</text>
  <text class="meta" x="505" y="1281">contacts</text>

  <rect class="admin" x="390" y="1345" width="230" height="98" rx="15"/>
  <text class="text" x="505" y="1377">Thực hiện thao tác</text>
  <text class="meta" x="505" y="1400">thêm/sửa/xóa</text>
  <text class="meta" x="505" y="1418">đổi trạng thái</text>
  <text class="meta" x="505" y="1436">nâng/hạ role</text>

  <rect class="server" x="710" y="1345" width="230" height="98" rx="15"/>
  <text class="text" x="825" y="1377">Ghi dữ liệu</text>
  <text class="meta" x="825" y="1400">products, orders</text>
  <text class="meta" x="825" y="1418">users, reviews</text>
  <text class="meta" x="825" y="1436">contacts</text>

  <rect class="notify" x="1030" y="1345" width="230" height="98" rx="15"/>
  <text class="text" x="1145" y="1377">Tạo notification</text>
  <text class="meta" x="1145" y="1400">khi đổi trạng thái</text>
  <text class="meta" x="1145" y="1418">order/contact</text>
  <text class="meta" x="1145" y="1436">đẩy SSE</text>

  <rect class="admin" x="390" y="1505" width="230" height="78" rx="15"/>
  <text class="text" x="505" y="1534">Popup kết quả</text>
  <text class="meta" x="505" y="1558">thành công/lỗi</text>

  <rect class="admin" x="390" y="1615" width="230" height="48" rx="15"/>
  <text class="text" x="505" y="1644">Reload dữ liệu</text>

  <path class="line" d="M185 323V390"/>
  <path class="line" d="M300 429H710"/>
  <path class="line" d="M825 468V540"/>
  <path class="line" d="M710 584H300"/>

  <path class="line" d="M620 824H710"/>
  <path class="line" d="M825 910V945"/>
  <path class="line" d="M940 989C980 1045 645 1040 620 989"/>

  <path class="line" d="M505 1033V1190"/>
  <path class="line" d="M505 1288V1345"/>
  <path class="line" d="M620 1394H710"/>
  <path class="dash" d="M940 1394H1030"/>
  <path class="line" d="M710 1394C665 1465 640 1500 620 1544"/>
  <path class="line" d="M505 1583V1615"/>

  <text class="label" x="955" y="829">Đúng</text>
  <text class="label" x="960" y="1375">order/contact</text>
</svg>
