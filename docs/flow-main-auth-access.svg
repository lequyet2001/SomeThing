<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1500" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Luồng đăng ký, đăng nhập và phân quyền</title>
  <desc id="desc">Biểu đồ cột dọc cho luồng đăng ký, đăng nhập, lưu token, tải dữ liệu và kiểm tra quyền admin.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 800 30px Arial, sans-serif; text-anchor: middle; }
      .subtitle { fill: #64748b; font: 15px Arial, sans-serif; text-anchor: middle; }
      .col { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .col-title { fill: #334155; font: 800 18px Arial, sans-serif; text-anchor: middle; }
      .ui { fill: #eef7ff; stroke: #5b9fd3; stroke-width: 2.2; }
      .client { fill: #f0fdf4; stroke: #49a66c; stroke-width: 2.2; }
      .server { fill: #fff7e8; stroke: #df9c39; stroke-width: 2.2; }
      .error { fill: #fff1f2; stroke: #e05b6b; stroke-width: 2.2; }
      .decision { fill: #ffffff; stroke: #df9c39; stroke-width: 2.2; }
      .text { fill: #111827; font: 700 16px Arial, sans-serif; text-anchor: middle; }
      .meta { fill: #475569; font: 13px Arial, sans-serif; text-anchor: middle; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .label { fill: #334155; font: 700 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1500"/>
  <text class="title" x="600" y="54">Luồng chính: Đăng ký, đăng nhập và phân quyền</text>
  <text class="subtitle" x="600" y="82">Bố cục cột dọc: UI → Client/Redux → Backend/MongoDB</text>

  <rect class="col" x="60" y="115" width="300" height="1305" rx="22"/>
  <rect class="col" x="450" y="115" width="300" height="1305" rx="22"/>
  <rect class="col" x="840" y="115" width="300" height="1305" rx="22"/>
  <text class="col-title" x="210" y="153">UI người dùng</text>
  <text class="col-title" x="600" y="153">Client / Redux</text>
  <text class="col-title" x="990" y="153">Backend / MongoDB</text>

  <rect class="ui" x="95" y="195" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="224">Mở form</text>
  <text class="meta" x="210" y="248">/login hoặc /register</text>

  <rect class="ui" x="95" y="330" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="359">Nhập thông tin</text>
  <text class="meta" x="210" y="383">email, mật khẩu</text>

  <rect class="ui" x="95" y="465" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="494">Submit form</text>
  <text class="meta" x="210" y="518">gọi action auth</text>

  <rect class="client" x="485" y="465" width="230" height="78" rx="15"/>
  <text class="text" x="600" y="494">Chuẩn bị request</text>
  <text class="meta" x="600" y="518">handleAuth()</text>

  <rect class="server" x="875" y="465" width="230" height="78" rx="15"/>
  <text class="text" x="990" y="494">Auth API</text>
  <text class="meta" x="990" y="518">POST login/register</text>

  <rect class="server" x="875" y="610" width="230" height="78" rx="15"/>
  <text class="text" x="990" y="639">Kiểm tra dữ liệu</text>
  <text class="meta" x="990" y="663">user, password, role</text>

  <polygon class="decision" points="990,755 1105,825 990,895 875,825"/>
  <text class="text" x="990" y="815">Hợp lệ?</text>
  <text class="meta" x="990" y="841">trả user + token</text>

  <rect class="error" x="95" y="785" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="814">Hiển thị lỗi</text>
  <text class="meta" x="210" y="838">sai email/mật khẩu</text>

  <rect class="client" x="485" y="935" width="230" height="78" rx="15"/>
  <text class="text" x="600" y="964">Lưu token</text>
  <text class="meta" x="600" y="988">localStorage + store</text>

  <rect class="client" x="485" y="1070" width="230" height="88" rx="15"/>
  <text class="text" x="600" y="1101">Đồng bộ dữ liệu</text>
  <text class="meta" x="600" y="1124">profile, cart, orders</text>
  <text class="meta" x="600" y="1143">notifications, SSE</text>

  <polygon class="decision" points="600,1210 715,1280 600,1350 485,1280"/>
  <text class="text" x="600" y="1270">Role admin?</text>
  <text class="meta" x="600" y="1296">route guard</text>

  <rect class="ui" x="95" y="1290" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="1319">Vào tài khoản</text>
  <text class="meta" x="210" y="1343">/account</text>

  <rect class="ui" x="875" y="1290" width="230" height="78" rx="15"/>
  <text class="text" x="990" y="1319">Vào quản trị</text>
  <text class="meta" x="990" y="1343">/admin/*</text>

  <path class="line" d="M210 273V330"/>
  <path class="line" d="M210 408V465"/>
  <path class="line" d="M325 504H485"/>
  <path class="line" d="M715 504H875"/>
  <path class="line" d="M990 543V610"/>
  <path class="line" d="M990 688V755"/>
  <path class="line" d="M875 825H325"/>
  <path class="line" d="M990 895C990 925 760 935 715 974"/>
  <path class="line" d="M600 1013V1070"/>
  <path class="line" d="M600 1158V1210"/>
  <path class="line" d="M485 1280H325"/>
  <path class="line" d="M715 1280H875"/>

  <text class="label" x="792" y="805">Không</text>
  <text class="label" x="790" y="943">Có</text>
  <text class="label" x="365" y="1268">Không</text>
  <text class="label" x="790" y="1268">Có</text>
</svg>
