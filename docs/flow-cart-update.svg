<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460" viewBox="0 0 1100 460">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker></defs>
  <style>.box{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:12}.api{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12}.warn{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:12}.t{font-family:Arial,sans-serif;font-size:19px;fill:#111827}.s{font-family:Arial,sans-serif;font-size:14px;fill:#334155}.h{font-family:Arial,sans-serif;font-size:24px;font-weight:700;fill:#0f172a}.ar{stroke:#2563eb;stroke-width:3;marker-end:url(#a);fill:none}</style>
  <text x="550" y="40" text-anchor="middle" class="h">Luồng cập nhật hoặc xóa sản phẩm trong giỏ hàng</text>
  <rect x="45" y="90" width="205" height="105" class="box"/><text x="147" y="128" text-anchor="middle" class="t">CartPage</text><text x="147" y="156" text-anchor="middle" class="s">đổi số lượng hoặc xóa</text>
  <rect x="315" y="90" width="215" height="105" class="box"/><text x="422" y="128" text-anchor="middle" class="t">useCartActions</text><text x="422" y="156" text-anchor="middle" class="s">updateQuantity / remove</text>
  <rect x="600" y="75" width="225" height="135" class="box"/><text x="712" y="112" text-anchor="middle" class="t">cartSlice</text><text x="712" y="140" text-anchor="middle" class="s">cập nhật local trước</text><text x="712" y="164" text-anchor="middle" class="s">giảm độ trễ UI</text>
  <rect x="875" y="75" width="180" height="135" class="api"/><text x="965" y="112" text-anchor="middle" class="t">Cart API</text><text x="965" y="140" text-anchor="middle" class="s">PATCH quantity</text><text x="965" y="164" text-anchor="middle" class="s">DELETE item</text>
  <rect x="220" y="305" width="230" height="95" class="warn"/><text x="335" y="340" text-anchor="middle" class="t">Nếu lỗi API</text><text x="335" y="367" text-anchor="middle" class="s">hiển thị notice lỗi</text>
  <rect x="520" y="305" width="225" height="95" class="box"/><text x="632" y="340" text-anchor="middle" class="t">cart mới từ server</text><text x="632" y="367" text-anchor="middle" class="s">dispatch setCart(data.cart)</text>
  <rect x="820" y="305" width="220" height="95" class="box"/><text x="930" y="340" text-anchor="middle" class="t">Giao diện render lại</text><text x="930" y="367" text-anchor="middle" class="s">items, count, total</text>
  <path d="M250 142 H315" class="ar"/><path d="M530 142 H600" class="ar"/><path d="M825 142 H875" class="ar"/><path d="M965 210 C940 270 720 280 670 305" class="ar"/><path d="M745 352 H820" class="ar"/><path d="M422 195 C390 245 350 270 335 305" class="ar"/>
