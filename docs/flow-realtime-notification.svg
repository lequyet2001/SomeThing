<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; rx: 10; }
      .api { fill: #eef5ff; stroke: #7aa2d6; stroke-width: 1.5; rx: 10; }
      .store { fill: #eef8f0; stroke: #76b887; stroke-width: 1.5; rx: 10; }
      .warn { fill: #fff7ed; stroke: #d89b5c; stroke-width: 1.5; rx: 10; }
      .h { font: 700 24px Arial, sans-serif; fill: #111827; }
      .t { font: 700 15px Arial, sans-serif; fill: #111827; }
      .s { font: 13px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #374151; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
    </marker>
  </defs>

  <rect class="bg" width="1120" height="560" />
  <text x="560" y="42" text-anchor="middle" class="h">Luồng realtime notification cho người dùng</text>

  <rect x="40" y="90" width="180" height="95" class="box"/>
  <text x="130" y="125" text-anchor="middle" class="t">Admin cập nhật</text>
  <text x="130" y="152" text-anchor="middle" class="s">Order / Contact status</text>

  <rect x="275" y="90" width="200" height="95" class="api"/>
  <text x="375" y="125" text-anchor="middle" class="t">Admin API</text>
  <text x="375" y="152" text-anchor="middle" class="s">PATCH /admin/*/status</text>

  <rect x="530" y="90" width="220" height="95" class="store"/>
  <text x="640" y="125" text-anchor="middle" class="t">UserNotification</text>
  <text x="640" y="152" text-anchor="middle" class="s">Lưu MongoDB + unread</text>

  <rect x="805" y="90" width="235" height="95" class="api"/>
  <text x="922" y="125" text-anchor="middle" class="t">SSE clients</text>
  <text x="922" y="152" text-anchor="middle" class="s">event: notification</text>

  <rect x="805" y="255" width="235" height="100" class="box"/>
  <text x="922" y="290" text-anchor="middle" class="t">Browser EventSource</text>
  <text x="922" y="318" text-anchor="middle" class="s">/notifications/stream</text>

  <rect x="530" y="255" width="220" height="100" class="store"/>
  <text x="640" y="290" text-anchor="middle" class="t">Redux</text>
  <text x="640" y="318" text-anchor="middle" class="s">userNotifications slice</text>

  <rect x="275" y="255" width="200" height="100" class="box"/>
  <text x="375" y="290" text-anchor="middle" class="t">Header</text>
  <text x="375" y="318" text-anchor="middle" class="s">Chuông + badge unread</text>

  <rect x="40" y="255" width="180" height="100" class="warn"/>
  <text x="130" y="290" text-anchor="middle" class="t">Toast</text>
  <text x="130" y="318" text-anchor="middle" class="s">Hiện ngay cho user</text>

  <rect x="275" y="415" width="200" height="90" class="api"/>
  <text x="375" y="448" text-anchor="middle" class="t">Read/Delete API</text>
  <text x="375" y="476" text-anchor="middle" class="s">PATCH / DELETE</text>

  <rect x="530" y="415" width="220" height="90" class="store"/>
  <text x="640" y="448" text-anchor="middle" class="t">MongoDB</text>
  <text x="640" y="476" text-anchor="middle" class="s">readAt hoặc xóa record</text>

  <path class="arrow" d="M220 137 L275 137" />
  <path class="arrow" d="M475 137 L530 137" />
  <path class="arrow" d="M750 137 L805 137" />
  <path class="arrow" d="M922 185 L922 255" />
  <path class="arrow" d="M805 305 L750 305" />
  <path class="arrow" d="M530 305 L475 305" />
  <path class="arrow" d="M275 305 L220 305" />
  <path class="arrow" d="M375 355 L375 415" />
  <path class="arrow" d="M475 460 L530 460" />
</svg>
