<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Use case overview - Marseille04 Shop</title>
  <desc id="desc">Sơ đồ use case tổng quan của hệ thống bán hàng Marseille04 Shop, chia nhóm theo khách hàng, quản trị và hệ thống.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .boundary { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2.4; }
      .panel { fill: #ffffff; stroke-width: 2; }
      .panel.customer { stroke: #4f9bd8; }
      .panel.account { stroke: #45a676; }
      .panel.admin { stroke: #e29b32; }
      .panel.system { stroke: #8b5cf6; }
      .title { fill: #0f172a; font: 800 34px Arial, sans-serif; text-anchor: middle; }
      .subtitle { fill: #475569; font: 17px Arial, sans-serif; text-anchor: middle; }
      .panel-title { fill: #0f172a; font: 800 21px Arial, sans-serif; }
      .panel-note { fill: #64748b; font: 14px Arial, sans-serif; }
      .usecase { fill: #eef7ff; stroke: #5b9fd3; stroke-width: 2; }
      .usecase.account { fill: #eefaf3; stroke: #4fa66e; }
      .usecase.admin { fill: #fff7e9; stroke: #df9c39; }
      .usecase.system { fill: #f4f0ff; stroke: #8b5cf6; }
      .usecase-title { fill: #111827; font: 700 17px Arial, sans-serif; text-anchor: middle; }
      .usecase-meta { fill: #475569; font: 13px Arial, sans-serif; text-anchor: middle; }
      .actor-label { fill: #111827; font: 800 20px Arial, sans-serif; text-anchor: middle; }
      .actor-sub { fill: #64748b; font: 14px Arial, sans-serif; text-anchor: middle; }
      .actor-line { stroke: #111827; stroke-width: 8; stroke-linecap: round; fill: none; }
      .actor-head { fill: #111827; }
      .connector { stroke: #64748b; stroke-width: 2.2; fill: none; }
      .connector.admin { stroke: #b7791f; }
      .connector.system { stroke: #7c3aed; stroke-dasharray: 8 8; }
      .legend-text { fill: #334155; font: 14px Arial, sans-serif; }
      .dot-customer { fill: #5b9fd3; }
      .dot-account { fill: #4fa66e; }
      .dot-admin { fill: #df9c39; }
      .dot-system { fill: #8b5cf6; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1120"/>

  <text class="title" x="800" y="58">Marseille04 Shop - Use Case Overview</text>
  <text class="subtitle" x="800" y="90">Tổng quan actor, nhóm chức năng và luồng nghiệp vụ chính của hệ thống</text>

  <rect class="boundary" x="250" y="125" width="1100" height="900" rx="28"/>
  <text class="panel-title" x="285" y="168">System boundary: Web bán hàng + API + MongoDB</text>
  <text class="panel-note" x="285" y="193">Các use case được nhóm theo khu vực thao tác để hạn chế đường nối chồng chéo.</text>

  <!-- Actors -->
  <g transform="translate(92 270)">
    <circle class="actor-head" cx="68" cy="38" r="30"/>
    <path class="actor-line" d="M68 74v110M18 116h100M68 184l-44 78M68 184l44 78"/>
    <text class="actor-label" x="68" y="303">Khách hàng</text>
    <text class="actor-sub" x="68" y="326">Guest / User</text>
  </g>

  <g transform="translate(91 720)">
    <circle class="actor-head" cx="69" cy="34" r="28"/>
    <path class="actor-line" d="M69 68v100M22 106h94M69 168l-42 74M69 168l42 74"/>
    <text class="actor-label" x="69" y="284">Admin</text>
    <text class="actor-sub" x="69" y="307">Quản trị cửa hàng</text>
  </g>

  <g transform="translate(1414 455)">
    <rect x="0" y="0" width="120" height="148" rx="22" fill="#f4f0ff" stroke="#8b5cf6" stroke-width="2.2"/>
    <circle cx="60" cy="42" r="22" fill="#7c3aed"/>
    <rect x="28" y="76" width="64" height="12" rx="6" fill="#7c3aed"/>
    <rect x="28" y="100" width="64" height="12" rx="6" fill="#7c3aed" opacity="0.78"/>
    <rect x="28" y="124" width="64" height="12" rx="6" fill="#7c3aed" opacity="0.58"/>
    <text class="actor-label" x="60" y="184">Hệ thống</text>
    <text class="actor-sub" x="60" y="207">API / DB / SSE</text>
  </g>

  <!-- Customer panel -->
  <rect class="panel customer" x="300" y="235" width="1000" height="260" rx="22"/>
  <text class="panel-title" x="330" y="274">Nhóm khách hàng: khám phá và mua sản phẩm</text>
  <text class="panel-note" x="330" y="299">Các chức năng công khai và chức năng mua hàng thường dùng trên web.</text>

  <g>
    <ellipse class="usecase" cx="445" cy="365" rx="122" ry="45"/>
    <text class="usecase-title" x="445" y="359">Đăng ký</text>
    <text class="usecase-meta" x="445" y="382">UC-01 /register</text>
  </g>
  <g>
    <ellipse class="usecase" cx="695" cy="365" rx="122" ry="45"/>
    <text class="usecase-title" x="695" y="359">Đăng nhập</text>
    <text class="usecase-meta" x="695" y="382">UC-02 /login</text>
  </g>
  <g>
    <ellipse class="usecase" cx="945" cy="365" rx="132" ry="45"/>
    <text class="usecase-title" x="945" y="359">Tìm kiếm, lọc</text>
    <text class="usecase-meta" x="945" y="382">UC-03 /shop</text>
  </g>
  <g>
    <ellipse class="usecase" cx="1175" cy="365" rx="110" ry="45"/>
    <text class="usecase-title" x="1175" y="359">Xem SP</text>
    <text class="usecase-meta" x="1175" y="382">UC-04 slug</text>
  </g>
  <g>
    <ellipse class="usecase" cx="520" cy="445" rx="128" ry="45"/>
    <text class="usecase-title" x="520" y="439">Đánh giá SP</text>
    <text class="usecase-meta" x="520" y="462">UC-05 reviews</text>
  </g>
  <g>
    <ellipse class="usecase" cx="790" cy="445" rx="132" ry="45"/>
    <text class="usecase-title" x="790" y="439">Quản lý giỏ</text>
    <text class="usecase-meta" x="790" y="462">UC-06 cart</text>
  </g>
  <g>
    <ellipse class="usecase" cx="1065" cy="445" rx="150" ry="45"/>
    <text class="usecase-title" x="1065" y="439">Đặt hàng, thanh toán</text>
    <text class="usecase-meta" x="1065" y="462">UC-07 checkout</text>
  </g>

  <!-- Account panel -->
  <rect class="panel account" x="300" y="535" width="1000" height="210" rx="22"/>
  <text class="panel-title" x="330" y="574">Nhóm tài khoản và hỗ trợ</text>
  <text class="panel-note" x="330" y="599">Các chức năng cần đăng nhập hoặc liên quan tới chăm sóc khách hàng.</text>

  <g>
    <ellipse class="usecase account" cx="460" cy="668" rx="140" ry="45"/>
    <text class="usecase-title" x="460" y="662">Hồ sơ, avatar</text>
    <text class="usecase-meta" x="460" y="685">UC-08 /account</text>
  </g>
  <g>
    <ellipse class="usecase account" cx="720" cy="668" rx="140" ry="45"/>
    <text class="usecase-title" x="720" y="662">Lịch sử mua</text>
    <text class="usecase-meta" x="720" y="685">UC-09 orders/me</text>
  </g>
  <g>
    <ellipse class="usecase account" cx="980" cy="668" rx="142" ry="45"/>
    <text class="usecase-title" x="980" y="662">Liên hệ hỗ trợ</text>
    <text class="usecase-meta" x="980" y="685">UC-10 contact</text>
  </g>
  <g>
    <ellipse class="usecase account" cx="1200" cy="668" rx="88" ry="45"/>
    <text class="usecase-title" x="1200" y="662">Địa chỉ</text>
    <text class="usecase-meta" x="1200" y="685">shipping</text>
  </g>

  <!-- Admin panel -->
  <rect class="panel admin" x="300" y="785" width="1000" height="200" rx="22"/>
  <text class="panel-title" x="330" y="824">Nhóm quản trị cửa hàng</text>
  <text class="panel-note" x="330" y="849">Chỉ user có role admin được truy cập các route /admin/* và API quản trị.</text>

  <g>
    <ellipse class="usecase admin" cx="430" cy="920" rx="112" ry="43"/>
    <text class="usecase-title" x="430" y="914">Thống kê</text>
    <text class="usecase-meta" x="430" y="937">UC-13</text>
  </g>
  <g>
    <ellipse class="usecase admin" cx="640" cy="920" rx="122" ry="43"/>
    <text class="usecase-title" x="640" y="914">Quản lý SP</text>
    <text class="usecase-meta" x="640" y="937">UC-14</text>
  </g>
  <g>
    <ellipse class="usecase admin" cx="865" cy="920" rx="132" ry="43"/>
    <text class="usecase-title" x="865" y="914">Quản lý đơn</text>
    <text class="usecase-meta" x="865" y="937">UC-15</text>
  </g>
  <g>
    <ellipse class="usecase admin" cx="1110" cy="920" rx="142" ry="43"/>
    <text class="usecase-title" x="1110" y="914">User, review, LH</text>
    <text class="usecase-meta" x="1110" y="937">UC-16..18</text>
  </g>

  <!-- Realtime/system use case -->
  <g>
    <ellipse class="usecase system" cx="800" cy="775" rx="172" ry="45"/>
    <text class="usecase-title" x="800" y="769">Thông báo realtime</text>
    <text class="usecase-meta" x="800" y="792">UC-11 SSE stream</text>
  </g>

  <g>
    <ellipse class="usecase system" cx="1180" cy="785" rx="110" ry="42"/>
    <text class="usecase-title" x="1180" y="779">Phân quyền</text>
    <text class="usecase-meta" x="1180" y="802">UC-12 admin</text>
  </g>

  <!-- Connectors: actor to grouped panels, intentionally minimal to avoid overlapping labels -->
  <path class="connector" d="M230 385 C255 385 270 365 300 365"/>
  <path class="connector" d="M230 520 C255 555 270 650 300 650"/>
  <path class="connector admin" d="M230 860 C260 875 275 910 300 910"/>

  <path class="connector system" d="M1300 365 C1360 395 1390 455 1414 505"/>
  <path class="connector system" d="M1300 668 C1360 640 1390 590 1414 550"/>
  <path class="connector system" d="M1300 920 C1370 850 1400 650 1414 570"/>
  <path class="connector system" d="M972 775 C1050 775 1080 785 1070 785"/>

  <!-- Legend -->
  <g transform="translate(300 1048)">
    <circle class="dot-customer" cx="0" cy="0" r="8"/>
    <text class="legend-text" x="18" y="5">Khách hàng</text>
    <circle class="dot-account" cx="160" cy="0" r="8"/>
    <text class="legend-text" x="178" y="5">Tài khoản / hỗ trợ</text>
    <circle class="dot-admin" cx="370" cy="0" r="8"/>
    <text class="legend-text" x="388" y="5">Quản trị</text>
    <circle class="dot-system" cx="520" cy="0" r="8"/>
    <text class="legend-text" x="538" y="5">Hệ thống / realtime</text>
  </g>
</svg>
