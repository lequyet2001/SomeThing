<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1580" viewBox="0 0 1200 1580" role="img" aria-labelledby="title desc">
  <title id="title">Luồng giỏ hàng, đặt hàng và thanh toán</title>
  <desc id="desc">Biểu đồ cột dọc cho luồng thêm giỏ, cập nhật giỏ, checkout, tạo đơn và chuyển sang thanh toán.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 800 30px Arial, sans-serif; text-anchor: middle; }
      .subtitle { fill: #64748b; font: 15px Arial, sans-serif; text-anchor: middle; }
      .col { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .col-title { fill: #334155; font: 800 18px Arial, sans-serif; text-anchor: middle; }
      .ui { fill: #eef7ff; stroke: #5b9fd3; stroke-width: 2.2; }
      .client { fill: #f0fdf4; stroke: #49a66c; stroke-width: 2.2; }
      .server { fill: #fff7e8; stroke: #df9c39; stroke-width: 2.2; }
      .error { fill: #fff1f2; stroke: #e05b6b; stroke-width: 2.2; }
      .decision { fill: #ffffff; stroke: #df9c39; stroke-width: 2.2; }
      .text { fill: #111827; font: 700 16px Arial, sans-serif; text-anchor: middle; }
      .meta { fill: #475569; font: 13px Arial, sans-serif; text-anchor: middle; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .label { fill: #334155; font: 700 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1580"/>
  <text class="title" x="600" y="54">Luồng chính: Giỏ hàng, đặt hàng và thanh toán</text>
  <text class="subtitle" x="600" y="82">Bố cục cột dọc, mỗi bước có khoảng cách cố định để không chồng chữ</text>

  <rect class="col" x="60" y="115" width="300" height="1390" rx="22"/>
  <rect class="col" x="450" y="115" width="300" height="1390" rx="22"/>
  <rect class="col" x="840" y="115" width="300" height="1390" rx="22"/>
  <text class="col-title" x="210" y="153">UI khách hàng</text>
  <text class="col-title" x="600" y="153">Redux / tính toán</text>
  <text class="col-title" x="990" y="153">Backend / MongoDB</text>

  <rect class="ui" x="95" y="195" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="224">Add Cart</text>
  <text class="meta" x="210" y="248">từ product card</text>

  <rect class="client" x="485" y="195" width="230" height="88" rx="15"/>
  <text class="text" x="600" y="226">Cập nhật cart</text>
  <text class="meta" x="600" y="249">local trước</text>
  <text class="meta" x="600" y="267">animation vẫn chạy</text>

  <rect class="server" x="875" y="195" width="230" height="78" rx="15"/>
  <text class="text" x="990" y="224">Sync cart</text>
  <text class="meta" x="990" y="248">POST /cart/items</text>

  <rect class="ui" x="95" y="350" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="379">Mở Cart</text>
  <text class="meta" x="210" y="403">/cart</text>

  <rect class="client" x="485" y="350" width="230" height="88" rx="15"/>
  <text class="text" x="600" y="381">Tính tiền</text>
  <text class="meta" x="600" y="404">subtotal, shipping</text>
  <text class="meta" x="600" y="422">total</text>

  <rect class="ui" x="95" y="515" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="544">Sửa giỏ</text>
  <text class="meta" x="210" y="568">số lượng / xóa</text>

  <rect class="server" x="875" y="515" width="230" height="88" rx="15"/>
  <text class="text" x="990" y="546">Cart API</text>
  <text class="meta" x="990" y="569">PATCH item</text>
  <text class="meta" x="990" y="587">DELETE item</text>

  <polygon class="decision" points="600,640 715,710 600,780 485,710"/>
  <text class="text" x="600" y="700">Giỏ có hàng?</text>
  <text class="meta" x="600" y="726">checkout allowed</text>

  <rect class="error" x="95" y="835" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="864">Không checkout</text>
  <text class="meta" x="210" y="888">giỏ rỗng</text>

  <rect class="ui" x="95" y="975" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="1004">Mở Checkout</text>
  <text class="meta" x="210" y="1028">/checkout</text>

  <rect class="client" x="485" y="975" width="230" height="88" rx="15"/>
  <text class="text" x="600" y="1006">Điền form</text>
  <text class="meta" x="600" y="1029">tự lấy địa chỉ</text>
  <text class="meta" x="600" y="1047">đã chọn</text>

  <rect class="ui" x="95" y="1135" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="1164">Đặt hàng</text>
  <text class="meta" x="210" y="1188">submit checkout</text>

  <rect class="server" x="875" y="1135" width="230" height="88" rx="15"/>
  <text class="text" x="990" y="1166">Tạo đơn</text>
  <text class="meta" x="990" y="1189">POST /orders</text>
  <text class="meta" x="990" y="1207">orderCode</text>

  <rect class="client" x="485" y="1295" width="230" height="78" rx="15"/>
  <text class="text" x="600" y="1324">Clear cart</text>
  <text class="meta" x="600" y="1348">lưu order hiện tại</text>

  <rect class="ui" x="95" y="1425" width="230" height="58" rx="15"/>
  <text class="text" x="210" y="1449">Payment</text>
  <text class="meta" x="210" y="1470">/payment</text>

  <path class="line" d="M325 234H485"/>
  <path class="line" d="M715 234H875"/>
  <path class="line" d="M600 283C560 320 360 325 325 389"/>
  <path class="line" d="M325 389H485"/>
  <path class="line" d="M600 438C560 475 360 482 325 554"/>
  <path class="line" d="M325 554C470 555 755 555 875 559"/>
  <path class="line" d="M990 603C945 635 765 645 715 710"/>
  <path class="line" d="M485 710H325"/>
  <path class="line" d="M600 780C540 855 300 900 210 975"/>
  <path class="line" d="M325 1014H485"/>
  <path class="line" d="M600 1063C560 1105 360 1110 325 1174"/>
  <path class="line" d="M325 1174C500 1178 750 1178 875 1179"/>
  <path class="line" d="M990 1223C955 1270 765 1285 715 1334"/>
  <path class="line" d="M600 1373C550 1410 350 1415 325 1454"/>

  <text class="label" x="360" y="700">Không</text>
  <text class="label" x="635" y="817">Có</text>
</svg>
