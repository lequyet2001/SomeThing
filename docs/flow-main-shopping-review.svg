<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1680" viewBox="0 0 1200 1680" role="img" aria-labelledby="title desc">
  <title id="title">Luồng tìm kiếm, xem sản phẩm và đánh giá</title>
  <desc id="desc">Biểu đồ cột dọc cho luồng tải catalog, tìm kiếm, xem chi tiết, thêm giỏ và đánh giá sản phẩm.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font: 800 30px Arial, sans-serif; text-anchor: middle; }
      .subtitle { fill: #64748b; font: 15px Arial, sans-serif; text-anchor: middle; }
      .col { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .col-title { fill: #334155; font: 800 18px Arial, sans-serif; text-anchor: middle; }
      .ui { fill: #eef7ff; stroke: #5b9fd3; stroke-width: 2.2; }
      .client { fill: #f0fdf4; stroke: #49a66c; stroke-width: 2.2; }
      .server { fill: #fff7e8; stroke: #df9c39; stroke-width: 2.2; }
      .error { fill: #fff1f2; stroke: #e05b6b; stroke-width: 2.2; }
      .decision { fill: #ffffff; stroke: #df9c39; stroke-width: 2.2; }
      .text { fill: #111827; font: 700 16px Arial, sans-serif; text-anchor: middle; }
      .meta { fill: #475569; font: 13px Arial, sans-serif; text-anchor: middle; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .label { fill: #334155; font: 700 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1680"/>
  <text class="title" x="600" y="54">Luồng chính: Tìm kiếm, xem sản phẩm và đánh giá</text>
  <text class="subtitle" x="600" y="82">Các bước đi từ trên xuống, tách rõ UI, Redux và Backend</text>

  <rect class="col" x="60" y="115" width="300" height="1490" rx="22"/>
  <rect class="col" x="450" y="115" width="300" height="1490" rx="22"/>
  <rect class="col" x="840" y="115" width="300" height="1490" rx="22"/>
  <text class="col-title" x="210" y="153">UI</text>
  <text class="col-title" x="600" y="153">Redux / Derived data</text>
  <text class="col-title" x="990" y="153">Backend API</text>

  <rect class="ui" x="95" y="195" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="224">Mở Shop</text>
  <text class="meta" x="210" y="248">/shop</text>

  <rect class="client" x="485" y="195" width="230" height="78" rx="15"/>
  <text class="text" x="600" y="224">Load catalog</text>
  <text class="meta" x="600" y="248">products, categories</text>

  <rect class="server" x="875" y="195" width="230" height="88" rx="15"/>
  <text class="text" x="990" y="226">Catalog API</text>
  <text class="meta" x="990" y="249">GET /products</text>
  <text class="meta" x="990" y="267">GET /categories</text>

  <rect class="client" x="485" y="340" width="230" height="78" rx="15"/>
  <text class="text" x="600" y="369">Lưu vào store</text>
  <text class="meta" x="600" y="393">catalogSlice</text>

  <rect class="ui" x="95" y="485" width="230" height="88" rx="15"/>
  <text class="text" x="210" y="516">Nhập tìm kiếm</text>
  <text class="meta" x="210" y="539">danh mục, giá</text>
  <text class="meta" x="210" y="557">phân trang</text>

  <rect class="client" x="485" y="485" width="230" height="88" rx="15"/>
  <text class="text" x="600" y="516">Tính danh sách</text>
  <text class="meta" x="600" y="539">filteredProducts</text>
  <text class="meta" x="600" y="557">9 sản phẩm/trang</text>

  <rect class="ui" x="95" y="630" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="659">Render kết quả</text>
  <text class="meta" x="210" y="683">product cards</text>

  <rect class="ui" x="95" y="775" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="804">Mở chi tiết</text>
  <text class="meta" x="210" y="828">slug + id mã hóa</text>

  <rect class="client" x="485" y="775" width="230" height="88" rx="15"/>
  <text class="text" x="600" y="806">Giải mã slug</text>
  <text class="meta" x="600" y="829">tìm product id</text>
  <text class="meta" x="600" y="847">load reviews</text>

  <rect class="server" x="875" y="775" width="230" height="78" rx="15"/>
  <text class="text" x="990" y="804">Reviews API</text>
  <text class="meta" x="990" y="828">GET /reviews</text>

  <rect class="ui" x="95" y="930" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="959">ProductPage</text>
  <text class="meta" x="210" y="983">ảnh, giá, review</text>

  <rect class="ui" x="95" y="1075" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="1104">Add Cart</text>
  <text class="meta" x="210" y="1128">animation bay vào cart</text>

  <rect class="client" x="485" y="1075" width="230" height="78" rx="15"/>
  <text class="text" x="600" y="1104">Cập nhật cart</text>
  <text class="meta" x="600" y="1128">local + sync nếu login</text>

  <rect class="ui" x="95" y="1220" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="1249">Gửi đánh giá</text>
  <text class="meta" x="210" y="1273">sao + nội dung</text>

  <polygon class="decision" points="600,1210 715,1280 600,1350 485,1280"/>
  <text class="text" x="600" y="1270">Đã login?</text>
  <text class="meta" x="600" y="1296">review required</text>

  <rect class="error" x="95" y="1415" width="230" height="78" rx="15"/>
  <text class="text" x="210" y="1444">Popup login</text>
  <text class="meta" x="210" y="1468">chưa gửi API</text>

  <rect class="server" x="875" y="1415" width="230" height="78" rx="15"/>
  <text class="text" x="990" y="1444">Lưu review</text>
  <text class="meta" x="990" y="1468">POST /reviews</text>

  <rect class="client" x="485" y="1535" width="230" height="58" rx="15"/>
  <text class="text" x="600" y="1560">Cập nhật UI</text>
  <text class="meta" x="600" y="1581">prepend review</text>

  <path class="line" d="M325 234H485"/>
  <path class="line" d="M715 234H875"/>
  <path class="line" d="M990 283C990 320 760 325 715 379"/>
  <path class="line" d="M600 418V485"/>
  <path class="line" d="M325 529H485"/>
  <path class="line" d="M485 529H325"/>
  <path class="line" d="M210 573V630"/>
  <path class="line" d="M210 708V775"/>
  <path class="line" d="M325 814H485"/>
  <path class="line" d="M715 814H875"/>
  <path class="line" d="M600 863C560 900 360 905 325 969"/>
  <path class="line" d="M210 1008V1075"/>
  <path class="line" d="M325 1114H485"/>
  <path class="line" d="M210 1153V1220"/>
  <path class="line" d="M325 1259H485"/>
  <path class="line" d="M485 1280H325"/>
  <path class="line" d="M715 1280C780 1325 850 1375 875 1454"/>
  <path class="line" d="M990 1493C955 1530 760 1538 715 1564"/>

  <text class="label" x="360" y="1268">Không</text>
  <text class="label" x="770" y="1310">Có</text>
</svg>
