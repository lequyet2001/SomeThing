  <rect x="45" y="95" width="190" height="100" class="box"/><text x="140" y="132" text-anchor="middle" class="t">ProductPage</text><text x="140" y="160" text-anchor="middle" class="s">chọn sao + nhập review</text>
  <rect x="300" y="95" width="215" height="100" class="box"/><text x="407" y="132" text-anchor="middle" class="t">useReviewActions</text><text x="407" y="160" text-anchor="middle" class="s">submitReview</text>
  <rect x="570" y="80" width="210" height="130" class="store"/><text x="675" y="118" text-anchor="middle" class="t">Kiểm tra user</text><text x="675" y="146" text-anchor="middle" class="s">chưa login: mở modal</text><text x="675" y="170" text-anchor="middle" class="s">đã login: gọi API</text>
